<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oráculo de Métricas de Design — RD Station</title>
  <meta name="description" content="Central de conhecimento sobre métricas de UX e Produto, framework HEART e templates para Product Designers, UX Researchers e PMs.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,600,1,0&display=swap" rel="stylesheet">

  <style>
/* =========================================================================
   Oráculo de Métricas de Design — Folha de estilos
   Baseada no Tangram Design System (RD Station). Tokens = fonte da verdade.
   ========================================================================= */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── TOKENS ─────────────────────────────────────────────────────────── */
:root {
  /* Primárias */
  --primary-border: #00DBFF;
  --primary-border-hover: #0088CC;
  --primary-icon: #0077B2;
  --primary-icon-hover: #005580;
  --primary-icon-on-color: #00DBFF;
  --primary-surface-high-emphasis: #00DBFF;
  --primary-surface-low-emphasis: #B2F4FF;
  --primary-surface-hover: #66EBFF;
  --primary-text: #0077B2;
  --primary-text-hover: #005580;
  --primary-text-on-color: #00DBFF;

  /* Neutras */
  --neutral-border: #D6DBDE;
  --neutral-border-interactive: #B2BCC1;
  --neutral-border-interactive-hover: #8C9BA3;
  --neutral-icon-high-emphasis: #002233;
  --neutral-icon-low-emphasis: #596B7A;
  --neutral-icon-disabled: #8C98A3;
  --neutral-icon-inverse: #FFFFFF;
  --neutral-surface: #FFFFFF;
  --neutral-surface-high-emphasis: #E5E8EA;
  --neutral-surface-low-emphasis: #ECEEEF;
  --neutral-surface-hover: #DADEE0;
  --neutral-surface-disabled: #EDEFF1;
  --neutral-surface-inverse: #002233;
  --neutral-text-high-emphasis: #002233;
  --neutral-text-low-emphasis: #405466;
  --neutral-text-disabled: #7F8D99;
  --neutral-text-inverse: #FFFFFF;
  --neutral-surface-inverse-interactive: #002233;
  --neutral-surface-inverse-interactive-hover: #14384A;

  /* Funcionais */
  --danger-border: #C20046;
  --danger-icon: #C20046;
  --danger-surface-high-emphasis: #E60F57;
  --danger-surface-low-emphasis: #FFD6E4;
  --danger-surface-hover: #F53D74;
  --danger-text: #C20046;
  --success-border: #0AAF54;
  --success-icon: #087A3A;
  --success-surface-high-emphasis: #0ED869;
  --success-surface-low-emphasis: #D6FAE8;
  --success-text: #087A3A;
  --warning-border: #D4920A;
  --warning-icon: #A06800;
  --warning-surface-high-emphasis: #FFBD28;
  --warning-surface-low-emphasis: #FFF3D0;
  --warning-text: #A06800;
  --highlight-border: #6E00C5;
  --highlight-icon: #6E00C5;
  --highlight-surface-high-emphasis: #8800F7;
  --highlight-surface-low-emphasis: #EDD6FF;
  --highlight-text: #6E00C5;

  /* Suporte (gráficos / acentos de dado) */
  --support-mint: #00F2C9;
  --support-breeze-mint: #CCFCF1;
  --support-lime: #C3F628;
  --support-soft-lime: #E6FC88;
  --support-orange: #FF8900;

  /* Marca / shell */
  --color-nav-bg: #001927;

  /* Tipografia */
  --font: 'DM Sans', sans-serif;
  --text-xxl: 36px; --lh-xxl: 46px;
  --text-xl: 28px;  --lh-xl: 36px;
  --text-lg: 20px;  --lh-lg: 30px;
  --text-md: 16px;  --lh-md: 24px;
  --text-sm: 14px;  --lh-sm: 20px;
  --text-xs: 12px;  --lh-xs: 16px;

  /* Espaçamento */
  --size-spacing-01: 4px;
  --size-spacing-02: 8px;
  --size-spacing-03: 12px;
  --size-spacing-04: 16px;
  --size-spacing-05: 24px;
  --size-spacing-06: 32px;
  --size-spacing-07: 40px;
  --size-spacing-08: 48px;
  --size-spacing-09: 56px;
  --size-spacing-10: 64px;
  --size-spacing-11: 96px;

  /* Arredondamentos */
  --border-radius-xs: 4px;
  --border-radius-sm: 8px;
  --border-radius-md: 12px;
  --border-radius-lg: 16px;
  --border-radius-xl: 24px;
  --border-radius-pill: 999px;
  --border-radius-circle: 50%;

  /* Sombras */
  --shadow-xs: 0 1px 2px rgba(0,34,51,0.08);
  --shadow-sm: 0 4px 12px rgba(0,34,51,0.10);
  --shadow-md: 0 8px 24px rgba(0,34,51,0.12);
  --shadow-lg: 0 12px 32px rgba(0,34,51,0.16);

  /* Motion */
  --motion-duration-extra-fast: 100ms;
  --motion-duration-fast: 200ms;
  --motion-duration-normal: 300ms;
  --motion-timing-function-ease-in: cubic-bezier(0.55,0.055,0.675,0.19);
  --motion-timing-function-ease-out: cubic-bezier(0.215,0.61,0.355,1);
  --motion-timing-function-ease-in-out: cubic-bezier(0.645,0.045,0.355,1);

  --neutral-focus-outline: #0077B2;
}

/* Ícones Material Symbols (conforme spec do DS: rounded, fill, weight 600) */
.material-symbols-rounded {
  font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 24;
  font-size: 24px;
  line-height: 1;
  user-select: none;
}

body {
  font-family: var(--font);
  background: var(--color-nav-bg);
  min-height: 100vh;
  color: var(--neutral-text-high-emphasis);
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; }

/* ─── LAYOUT (shell canônico) ────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-rows: 64px 1fr;
  grid-template-columns: 64px 1fr;
  grid-template-areas: "navbar navbar" "sidebar content";
  height: 100vh;
  overflow: hidden;
}

/* ─── NAVBAR ─────────────────────────────────────────────────────────── */
.navbar {
  grid-area: navbar; background: var(--color-nav-bg);
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--size-spacing-03); height: 64px; position: relative; z-index: 9600;
}
.navbar-logo { display: flex; align-items: center; gap: var(--size-spacing-03); }
.navbar-product {
  display: flex; align-items: center; gap: var(--size-spacing-02);
  color: #fff; font-weight: 700; font-size: var(--text-md); letter-spacing: -0.16px;
  white-space: nowrap;
}
.navbar-secondary { display: flex; align-items: center; gap: var(--size-spacing-02); }
.navbar-icons { display: flex; align-items: center; }
.navbar-icon-btn {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--border-radius-sm); cursor: pointer; position: relative; color: #fff;
}
.navbar-icon-btn:hover { background: rgba(255,255,255,0.08); }
.badge-dot {
  position: absolute; top: 6px; right: 6px; width: 8px; height: 8px;
  background: var(--danger-surface-high-emphasis); border-radius: 50%;
}
.navbar-divider { width: 1px; height: 32px; background: rgba(255,255,255,0.15); margin: 0 4px; }
.account-menu {
  display: flex; align-items: center; gap: var(--size-spacing-02);
  padding: var(--size-spacing-02); border-radius: var(--border-radius-sm); cursor: pointer; position: relative;
}
.account-menu:hover { background: rgba(255,255,255,0.08); }
.account-avatar {
  width: 24px; height: 24px; border-radius: var(--border-radius-sm);
  background: var(--support-mint); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--neutral-text-high-emphasis);
}
.account-name { color: #fff; font-size: var(--text-sm); font-weight: 700; white-space: nowrap; letter-spacing: -0.14px; }
.account-menu > .material-symbols-rounded { color: #fff; font-size: 18px; }
.account-dropdown {
  display: none; position: absolute; top: calc(100% + 4px); right: 0;
  background: var(--neutral-surface); border-radius: var(--border-radius-md);
  box-shadow: var(--shadow-md); min-width: 180px; overflow: hidden; z-index: 9700;
}
.account-menu.open .account-dropdown { display: block; }
.account-dropdown-item {
  display: flex; align-items: center; gap: var(--size-spacing-02);
  padding: var(--size-spacing-03) var(--size-spacing-04);
  font-size: var(--text-sm); font-weight: 500; color: var(--neutral-text-high-emphasis); cursor: pointer;
}
.account-dropdown-item:hover { background: var(--neutral-surface-low-emphasis); }
.account-dropdown-item .material-symbols-rounded { font-size: 18px; color: var(--neutral-icon-low-emphasis); }

/* ─── SIDEBAR (rail de navegação do Oracle) ──────────────────────────── */
.sidebar {
  grid-area: sidebar; background: var(--color-nav-bg);
  display: flex; flex-direction: column; gap: var(--size-spacing-02); padding-top: var(--size-spacing-03);
}
.sidebar-item {
  display: flex; align-items: center; justify-content: center;
  padding: var(--size-spacing-03); position: relative; cursor: pointer; border: 0; background: none;
}
.sidebar-item-inner {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--border-radius-sm); color: #fff;
  transition: background var(--motion-duration-fast) var(--motion-timing-function-ease-in-out);
}
.sidebar-item:hover .sidebar-item-inner { background: rgba(255,255,255,0.08); }
.sidebar-item.active .sidebar-item-inner { background: var(--primary-icon); }
.sidebar-item.active::before {
  content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 24px; border-radius: 0 3px 3px 0; background: var(--primary-surface-high-emphasis);
}
.sidebar-item .material-symbols-rounded { color: #fff; }
/* tooltip da sidebar */
.sidebar-item .sb-tip {
  position: absolute; left: calc(100% + 8px); top: 50%; transform: translateY(-50%);
  background: var(--neutral-surface-inverse); color: var(--neutral-text-inverse);
  font-size: var(--text-sm); font-weight: 500; padding: 6px 10px; border-radius: var(--border-radius-sm);
  white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity var(--motion-duration-fast);
  z-index: 1010;
}
.sidebar-item:hover .sb-tip { opacity: 1; }

/* ─── CONTENT ────────────────────────────────────────────────────────── */
.content {
  grid-area: content; background: var(--neutral-surface);
  padding: 0 var(--size-spacing-06) var(--size-spacing-08);
  border-top-left-radius: 20px; overflow-y: auto; height: 100%; scroll-behavior: smooth;
}
.page { max-width: 1120px; margin: 0 auto; }

/* ─── PAGE HEADER ────────────────────────────────────────────────────── */
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between; gap: var(--size-spacing-04);
  padding: var(--size-spacing-07) 0 var(--size-spacing-05);
}
.page-header.inner { border-bottom: 1px solid var(--neutral-border); }
.page-header-main { min-width: 0; }
.page-title { font-size: var(--text-xl); line-height: var(--lh-xl); font-weight: 800; letter-spacing: -0.28px; }
.page-desc { margin-top: var(--size-spacing-02); color: var(--neutral-text-low-emphasis); font-size: var(--text-md); line-height: var(--lh-md); max-width: 64ch; }
.page-actions { display: flex; gap: var(--size-spacing-02); flex-shrink: 0; }

/* Breadcrumb */
.breadcrumb { display: flex; align-items: center; gap: var(--size-spacing-01); padding-top: var(--size-spacing-05); font-size: var(--text-sm); color: var(--neutral-text-low-emphasis); flex-wrap: wrap; }
.breadcrumb a { color: var(--primary-text); cursor: pointer; font-weight: 500; }
.breadcrumb a:hover { color: var(--primary-text-hover); text-decoration: underline; }
.breadcrumb .material-symbols-rounded { font-size: 16px; color: var(--neutral-icon-disabled); }

/* ─── BUTTONS (Tangram) ──────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--size-spacing-02);
  border: 0; cursor: pointer; user-select: none; white-space: nowrap; position: relative;
  height: 40px; min-height: 40px; padding: 0 var(--size-spacing-04);
  border-radius: var(--border-radius-md); font-family: var(--font);
  font-size: var(--text-md); font-weight: 700; letter-spacing: -0.16px;
  text-decoration: none;
  transition: background-color var(--motion-duration-extra-fast) var(--motion-timing-function-ease-in-out);
}
.btn .material-symbols-rounded { font-size: 24px; }
.btn:focus-visible { outline: 4px solid var(--neutral-focus-outline); outline-offset: 0; }
.btn.sm { height: 32px; min-height: 32px; padding: 0 var(--size-spacing-03); border-radius: var(--border-radius-sm); font-size: var(--text-sm); }
.btn.sm .material-symbols-rounded { font-size: 20px; }
.btn.fluid { width: 100%; }

.btn--primary { color: var(--primary-text-on-color); background: var(--neutral-surface-inverse-interactive); }
.btn--primary .material-symbols-rounded { color: var(--primary-icon-on-color); }
.btn--primary:hover { background: var(--neutral-surface-inverse-interactive-hover); }

.btn--secondary { color: var(--primary-text); background: var(--primary-surface-low-emphasis); }
.btn--secondary .material-symbols-rounded { color: var(--primary-icon); }
.btn--secondary:hover { background: var(--primary-surface-hover); }

.btn--tertiary { color: var(--primary-text); background: transparent; }
.btn--tertiary .material-symbols-rounded { color: var(--primary-icon); }
.btn--tertiary:hover { background: var(--primary-surface-low-emphasis); color: var(--primary-text-hover); }

.btn--neutral { color: var(--neutral-text-low-emphasis); background: transparent; }
.btn--neutral .material-symbols-rounded { color: var(--neutral-icon-low-emphasis); }
.btn--neutral:hover { background: var(--neutral-surface-low-emphasis); color: var(--neutral-text-high-emphasis); }

.btn--icon { width: 40px; padding: 0; }
.btn--icon.sm { width: 32px; }

/* Botão sobre superfície escura (hero) */
.region-contrast .btn--tertiary { color: var(--primary-text-on-color); }
.region-contrast .btn--tertiary .material-symbols-rounded { color: var(--primary-icon-on-color); }
.region-contrast .btn--tertiary:hover { background: rgba(255,255,255,0.12); color: #fff; }

/* ─── CARD (Tangram) ─────────────────────────────────────────────────── */
.card {
  background: var(--neutral-surface); border: 1px solid var(--neutral-border);
  border-radius: var(--border-radius-lg); padding: var(--size-spacing-05);
  transition: border-color var(--motion-duration-fast) var(--motion-timing-function-ease-out),
              box-shadow var(--motion-duration-fast) var(--motion-timing-function-ease-out);
}
.card.compact { padding: var(--size-spacing-04); }
.card.clickable { cursor: pointer; }
.card.clickable:hover { box-shadow: var(--shadow-sm); border-color: var(--neutral-border-interactive); }
.card.clickable:focus-visible { outline: 4px solid var(--neutral-focus-outline); outline-offset: 2px; }

/* ─── TAGS / BADGES ──────────────────────────────────────────────────── */
.tag {
  display: inline-flex; align-items: center; gap: var(--size-spacing-01);
  height: 24px; padding: 0 var(--size-spacing-02); border-radius: var(--border-radius-xs);
  font-size: var(--text-xs); font-weight: 700; line-height: 1; letter-spacing: 0;
  background: var(--neutral-surface-high-emphasis); color: var(--neutral-text-high-emphasis); white-space: nowrap;
}
.tag .material-symbols-rounded { font-size: 14px; }
.tag--primary { background: var(--primary-surface-low-emphasis); color: var(--primary-text); }
.tag--success { background: var(--success-surface-low-emphasis); color: var(--success-text); }
.tag--warning { background: var(--warning-surface-low-emphasis); color: var(--warning-text); }
.tag--danger  { background: var(--danger-surface-low-emphasis);  color: var(--danger-text); }
.tag--highlight { background: var(--highlight-surface-low-emphasis); color: var(--highlight-text); }

/* ─── SEARCH / INPUT (Tangram) ───────────────────────────────────────── */
.input-control {
  display: flex; align-items: center; gap: var(--size-spacing-02);
  height: 40px; padding: 0 var(--size-spacing-03);
  background: var(--neutral-surface); border: 1px solid var(--neutral-border);
  border-radius: var(--border-radius-md);
  transition: border-color var(--motion-duration-fast);
}
.input-control:focus-within { border-color: var(--neutral-border-interactive-hover); }
.input-control .material-symbols-rounded { font-size: 22px; color: var(--neutral-icon-low-emphasis); }
.input-control input {
  border: 0; outline: 0; flex: 1; min-width: 0; background: transparent;
  font-family: var(--font); font-size: var(--text-md); color: var(--neutral-text-high-emphasis);
}
.input-control input::placeholder { color: var(--neutral-text-disabled); }
.input-clear { border: 0; background: transparent; cursor: pointer; display: none; align-items: center; color: var(--neutral-icon-low-emphasis); }
.input-clear.show { display: flex; }
.search-hero { max-width: 640px; }

/* ─── DATABLOCK ──────────────────────────────────────────────────────── */
.datablock { display: inline-flex; flex-direction: column; }
.datablock .db-title { font-size: var(--text-sm); font-weight: 700; color: var(--neutral-text-low-emphasis); text-transform: uppercase; letter-spacing: 0; }
.datablock .db-value { font-size: var(--text-xxl); line-height: var(--lh-xxl); font-weight: 800; letter-spacing: -0.72px; }
.datablock .db-aux { font-size: var(--text-sm); font-weight: 700; color: var(--neutral-text-low-emphasis); padding-top: var(--size-spacing-02); }

/* ─── CHIPS / FILTROS ────────────────────────────────────────────────── */
.filter-bar { display: flex; gap: var(--size-spacing-02); flex-wrap: wrap; align-items: center; }
.chip {
  display: inline-flex; align-items: center; gap: var(--size-spacing-01);
  height: 32px; padding: 0 var(--size-spacing-03); border-radius: var(--border-radius-pill);
  border: 1px solid var(--neutral-border); background: var(--neutral-surface);
  font-size: var(--text-sm); font-weight: 700; color: var(--neutral-text-low-emphasis); cursor: pointer;
  transition: all var(--motion-duration-fast);
}
.chip:hover { border-color: var(--neutral-border-interactive-hover); color: var(--neutral-text-high-emphasis); }
.chip.active { background: var(--neutral-surface-inverse); border-color: var(--neutral-surface-inverse); color: var(--neutral-text-inverse); }
.chip.active .material-symbols-rounded { color: var(--neutral-text-inverse); }
.chip .material-symbols-rounded { font-size: 16px; }

/* ─── TABS ───────────────────────────────────────────────────────────── */
.tabs { display: flex; gap: var(--size-spacing-05); border-bottom: 2px solid var(--neutral-border); margin-bottom: var(--size-spacing-05); }
.tab {
  appearance: none; border: 0; background: none; cursor: pointer; font-family: var(--font);
  height: 48px; padding: 0 2px; font-size: var(--text-md); font-weight: 700; color: var(--neutral-text-low-emphasis);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
}
.tab:hover { color: var(--neutral-text-high-emphasis); }
.tab.active { color: var(--primary-text); border-bottom-color: var(--primary-border); }

/* ─── ACCORDION ──────────────────────────────────────────────────────── */
.accordion-item { width: 100%; background: var(--neutral-surface); border-bottom: 1px solid var(--neutral-border); }
.accordion-head {
  display: flex; align-items: center; gap: var(--size-spacing-02); cursor: pointer; outline: none;
  font-size: var(--text-md); font-weight: 700; padding: var(--size-spacing-04) 0; width: 100%;
  border: 0; background: none; font-family: var(--font); text-align: left; color: var(--neutral-text-high-emphasis);
}
.accordion-head:hover { color: var(--primary-text-hover); }
.accordion-head .acc-icon { color: var(--neutral-icon-low-emphasis); margin-right: var(--size-spacing-01); font-size: 22px; }
.accordion-title { flex: 1; min-width: 0; }
.accordion-chevron { color: var(--neutral-icon-low-emphasis); transition: transform var(--motion-duration-normal) var(--motion-timing-function-ease-in-out); }
.accordion-item.open .accordion-chevron { transform: rotate(180deg); }
.accordion-body { display: none; padding: 0 0 var(--size-spacing-05) 30px; color: var(--neutral-text-low-emphasis); font-size: var(--text-md); line-height: var(--lh-md); }
.accordion-item.open .accordion-body { display: block; }

/* ─── ALERT / CALLOUT ────────────────────────────────────────────────── */
.alert {
  display: flex; gap: var(--size-spacing-03); padding: var(--size-spacing-04);
  border-radius: var(--border-radius-md); border-left: 4px solid var(--highlight-border);
  background: var(--highlight-surface-low-emphasis); color: var(--neutral-text-high-emphasis);
}
.alert .material-symbols-rounded { color: var(--highlight-icon); flex-shrink: 0; }
.alert.warning { border-left-color: var(--warning-border); background: var(--warning-surface-low-emphasis); }
.alert.warning .material-symbols-rounded { color: var(--warning-icon); }
.alert.success { border-left-color: var(--success-border); background: var(--success-surface-low-emphasis); }
.alert.success .material-symbols-rounded { color: var(--success-icon); }
.alert-title { font-weight: 700; margin-bottom: 2px; }
.alert-body { font-size: var(--text-sm); line-height: var(--lh-sm); color: var(--neutral-text-low-emphasis); }

/* ─── EMPTY STATE ────────────────────────────────────────────────────── */
.empty-state { padding: var(--size-spacing-08); display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; }
.empty-state .es-illu { width: 72px; height: 72px; border-radius: var(--border-radius-circle); background: var(--neutral-surface-low-emphasis); display: flex; align-items: center; justify-content: center; margin-bottom: var(--size-spacing-04); }
.empty-state .es-illu .material-symbols-rounded { font-size: 36px; color: var(--neutral-icon-low-emphasis); }
.empty-state .es-title { font-size: var(--text-lg); font-weight: 700; max-width: 600px; }
.empty-state .es-desc { color: var(--neutral-text-low-emphasis); margin-top: var(--size-spacing-02); max-width: 480px; }

/* ─── STEPS ──────────────────────────────────────────────────────────── */
.steps { display: flex; flex-direction: column; gap: 0; }
.step { display: flex; gap: var(--size-spacing-04); position: relative; padding-bottom: var(--size-spacing-05); }
.step:not(:last-child) .step-marker::after {
  content: ""; position: absolute; top: 32px; left: 15px; width: 2px; height: calc(100% - 32px);
  background: var(--neutral-border);
}
.step-marker { position: relative; flex-shrink: 0; }

.table-wrap .table th, .table-wrap .table td { padding: var(--size-spacing-03) var(--size-spacing-04); }

.dl-icon { width: 48px; height: 48px; border-radius: var(--border-radius-md); background: var(--highlight-surface-low-emphasis); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

<script>
/* =========================================================================
   Oráculo de Métricas de Design — Camada de aplicação
   Arquitetura: dados (data.js) → componentes puros → views → router.
   Sem dependências externas. Baixo acoplamento entre dados e render.
   ========================================================================= */
(function () {
  "use strict";

  var DATA = window.ORACLE_DATA;
  var APP = document.getElementById("app");
  var SIDEBAR_MAP = { "home": "#/", "metrics": "#/metricas", "heart": "#/heart", "templates": "#/templates", "practices": "#/boas-praticas" };

  /* ───────────────────────── helpers ───────────────────────── */
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function icon(name, cls) { return '<span class="material-symbols-rounded' + (cls ? " " + cls : "") + '" aria-hidden="true">' + name + "</span>"; }
  function byId(id) { return DATA.metrics.filter(function (m) { return m.id === id; })[0]; }
  function catLabel(id) { var c = DATA.categories.filter(function (c) { return c.id === id; })[0]; return c ? c.label : id; }
  function metricsInCategory(catId) { return DATA.metrics.filter(function (m) { return m.categories.indexOf(catId) !== -1; }); }

  function tagKindFor(b) { return ({ success: "tag--success", warning: "tag--warning", danger: "tag--danger", default: "" })[b] || ""; }

  /* ───────────────────────── componentes ───────────────────────── */
  function MetricCard(m) {
    var tags = m.categories.map(function (c) { return '<span class="tag tag--primary">' + esc(catLabel(c)) + "</span>"; }).join("");
    return '' +
      '<a class="card clickable metric-card" role="button" tabindex="0" data-link="#/metrica/' + m.id + '" aria-label="Abrir ' + esc(m.name) + '">' +
        '<div class="mc-top"><div class="mc-name">' + esc(m.name) + "</div>" + (m.type ? '<span class="tag">' + esc(m.type) + "</span>" : "") + "</div>" +
        (m.abbr ? '<div class="mc-abbr">' + esc(m.abbr) + "</div>" : "") +
        '<p class="mc-summary">' + esc(m.summary) + "</p>" +
        '<div class="mc-tags">' + tags + "</div>" +
      "</a>";
  }

  function PageHeader(opts) {
    return '<header class="page-header' + (opts.inner ? " inner" : "") + '">' +
      '<div class="page-header-main">' +
        '<h1 class="page-title">' + esc(opts.title) + "</h1>" +
        (opts.desc ? '<p class="page-desc">' + esc(opts.desc) + "</p>" : "") +
      "</div>" +
      (opts.actions ? '<div class="page-actions">' + opts.actions + "</div>" : "") +
    "</header>";
  }

  function Breadcrumb(items) {
    return '<nav class="breadcrumb" aria-label="Trilha">' + items.map(function (it, i) {
      var sep = i < items.length - 1 ? icon("chevron_right") : "";
      return (it.link ? '<a data-link="' + it.link + '">' + esc(it.label) + "</a>" : '<span aria-current="page">' + esc(it.label) + "</span>") + sep;
    }).join("") + "</nav>";
  }

  /* ───────────────────────── VIEW: Home ───────────────────────── */
  function viewHome() {
    var navCards = [
      { icon: "monitoring", title: "Métricas", desc: "Biblioteca completa de métricas de UX e Produto.", link: "#/metricas" },
      { icon: "favorite", title: "Framework HEART", desc: "Guia completo de aplicação do método do Google.", link: "#/heart" },
      { icon: "download", title: "Templates", desc: "Downloads e materiais de apoio prontos para uso.", link: "#/templates" },
      { icon: "verified", title: "Boas Práticas", desc: "Recomendações para definição e acompanhamento.", link: "#/boas-praticas" },
    ].map(function (c) {
      return '<a class="card clickable nav-card" role="button" tabindex="0" data-link="' + c.link + '">' +
        '<div class="nc-icon">' + icon(c.icon) + "</div>" +
        '<div class="nc-title">' + esc(c.title) + "</div>" +
        '<div class="nc-desc">' + esc(c.desc) + "</div>" +
        '<span class="nc-link">Acessar ' + icon("arrow_forward") + "</span>" +
      "</a>";
    }).join("");

    return '<div class="page">' +
      '<section class="hero region-contrast">' +
        '<span class="hero-eyebrow">' + icon("auto_awesome") + " Central de conhecimento · Design Chapter</span>" +
        '<h1 class="hero-title">Oráculo de Métricas de Design</h1>' +
        '<p class="hero-desc">A principal fonte de consulta sobre métricas de experiência, acompanhamento de resultados e frameworks de mensuração para Designers, Researchers e PMs.</p>' +
        '<div class="hero-actions">' +
          '<button class="btn btn--primary" data-link="#/metricas">' + icon("monitoring") + " Explorar Métricas</button>" +
          '<button class="btn btn--secondary" data-link="#/heart">' + icon("favorite") + " Framework HEART</button>" +
        "</div>" +
      "</section>" +

      '<section class="section" style="margin-top:var(--size-spacing-06)">' +
        '<label class="sr-only" for="home-search">Buscar no Oráculo</label>' +
        '<div class="input-control search-hero">' + icon("search") +
          '<input id="home-search" type="search" placeholder="Buscar métricas, frameworks, templates e guias…" autocomplete="off">' +
          '<button class="input-clear" aria-label="Limpar busca">' + icon("close") + "</button>" +
        "</div>" +
        '<div id="home-search-results" class="mt-4"></div>' +
      "</section>" +

      '<section class="section" id="home-cards">' +
        '<div class="section-head"><div><div class="section-title">Por onde começar</div><div class="section-sub">Quatro áreas para navegar pelo conhecimento de mensuração.</div></div></div>' +
        '<div class="grid grid-4">' + navCards + "</div>" +
      "</section>" +
    "</div>";
  }

  function bindHomeSearch() {
    var input = document.getElementById("home-search");
    if (!input) return;
    var out = document.getElementById("home-search-results");
    var cards = document.getElementById("home-cards");
    var clear = input.parentElement.querySelector(".input-clear");

    function render() {
      var q = input.value.trim().toLowerCase();
      clear.classList.toggle("show", q.length > 0);
      if (!q) { out.innerHTML = ""; if (cards) cards.style.display = ""; return; }

        '<div class="grid grid-metrics mt-3">' + res.map(resultCard).join("") + "</div>";

  function searchEverything(q) {
    var out = [];
    DATA.metrics.forEach(function (m) {
      var hay = (m.name + " " + (m.abbr || "") + " " + m.summary + " " + m.what + " " + m.categories.map(catLabel).join(" ")).toLowerCase();
      if (hay.indexOf(q) !== -1) out.push({ title: m.name + (m.abbr ? " · " + m.abbr : ""), desc: m.summary, kind: "Métrica", link: "#/metrica/" + m.id });
    });
    DATA.heart.dimensions.forEach(function (d) {
      if ((d.name + " " + d.definition).toLowerCase().indexOf(q) !== -1) out.push({ title: "HEART · " + d.name, desc: d.definition, kind: "Framework", link: "#/heart" });
    });
    [{ t: "Framework HEART", d: DATA.heart.intro.what, l: "#/heart", k: "Framework" }, { t: "Template UX Briefing — Follow-up de entrega", d: "Documento .docx para planejar o acompanhamento pós-delivery.", l: "#/templates", k: "Template" }].forEach(function (g) {
      if ((g.t + " " + g.d).toLowerCase().indexOf(q) !== -1) out.push({ title: g.t, desc: g.d, kind: g.k, link: g.l });
    });
    DATA.bestPractices.forEach(function (p) {
      if ((p.title + " " + p.body).toLowerCase().indexOf(q) !== -1) out.push({ title: p.title, desc: p.body.slice(0, 120) + "…", kind: "Boa prática", link: "#/boas-praticas" });

  /* ───────────────────────── Download do .docx ───────────────────────── */
  function downloadTemplate() {
    try {
      var b64 = window.ORACLE_TEMPLATE_DOCX_BASE64;
      if (!b64) { window.alert("Arquivo do template indisponível neste ambiente. No repositório, o botão aponta para ./assets/template-follow-up-entrega.docx"); return; }
      var bin = atob(b64);
      var len = bin.length, bytes = new Uint8Array(len);
      for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
      var blob = new Blob([bytes], { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "Template - Design - Follow-up de entrega.docx";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
    } catch (e) { console.error(e); window.alert("Não foi possível iniciar o download."); }
  }

  function route() {
    var hash = location.hash || "#/";
    var html, active = "home";

    if (hash === "#/" || hash === "") { html = viewHome(); active = "home"; }
    else if (hash === "#/metricas") { html = viewMetrics(); active = "metrics"; }
    else if (hash.indexOf("#/metrica/") === 0) { html = viewMetricDetail(hash.replace("#/metrica/", "")); active = "metrics"; }
    else if (hash === "#/heart") { html = viewHeart(); active = "heart"; }
    else if (hash === "#/templates") { html = viewTemplates(); active = "templates"; }
    else if (hash === "#/boas-praticas") { html = viewPractices(); active = "practices"; }
    else { html = '<div class="page">' + EmptyState("explore_off", "Página não encontrada", "Use o menu lateral para navegar pelo Oráculo.") + "</div>"; }

    APP.innerHTML = html;
    APP.scrollTop = 0;
    var content = document.querySelector(".content"); if (content) content.scrollTop = 0;
    setActiveSidebar(active);

    if (active === "home") bindHomeSearch();
    if (hash === "#/metricas") bindMetrics();
  }

    var link = e.target.closest("[data-link]");
    if (link) { e.preventDefault(); location.hash = link.getAttribute("data-link"); return; }

    var dl = e.target.closest("#download-docx, [data-download]");
    if (dl) { e.preventDefault(); downloadTemplate(); return; }

    var acc = e.target.closest(".accordion-head");
    if (acc) { acc.closest(".accordion-item").classList.toggle("open"); }
  });
  document.addEventListener("keydown", function (e) {
    if ((e.key === "Enter" || e.key === " ") && document.activeElement && document.activeElement.matches("[data-link]")) {
      e.preventDefault(); location.hash = document.activeElement.getAttribute("data-link");
    }
  });

  window.addEventListener("hashchange", route);
  window.addEventListener("DOMContentLoaded", route);
  if (document.readyState !== "loading") route();
})();

</script>
<script>
  (function () {
    var menu = document.getElementById("account-menu");
    if (menu) {
      menu.addEventListener("click", function (e) { e.stopPropagation(); menu.classList.toggle("open"); });
      document.addEventListener("click", function () { menu.classList.remove("open"); });
    }
  })();
</script>
</body>
</html>
